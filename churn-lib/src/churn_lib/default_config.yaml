model_card:
  name: Churn Prediction Model
  version: "1.0.0"
  description: >
    Binary classifier that estimates the probability a customer will cancel
    their subscription within the next billing cycle.
  intended_use: >
    Identify at-risk customers so the retention team can send targeted offers.
    Use find_threshold() to pick the operating point that matches your
    business constraint (e.g. recall >= 0.8 before maximising precision).
  limitations: >
    Trained on synthetic data. Validate against real customer cohorts before
    production use and retrain whenever drift is detected on any feature.

model:
  type: xgboost
  n_estimators: 100
  max_depth: 6
  learning_rate: 0.1
  random_state: 42
  use_class_weights: true

features:
  numeric:
    - name: tenure_months
      description: Months since the customer first subscribed.
      min: 0
      max: 120
    - name: monthly_charges
      description: Current monthly bill in USD.
      min: 0.0
      max: 500.0
    - name: num_products
      description: Number of active products or add-ons.
      min: 1
      max: 10
    - name: support_calls_last_6m
      description: Support tickets raised in the past 6 months.
      min: 0
      max: 50
    - name: age
      description: Customer age in years.
      min: 18
      max: 100
  categorical:
    - name: contract_type
      description: Billing commitment length.
      categories: [month-to-month, one-year, two-year]
    - name: payment_method
      description: How the customer pays each month.
      categories: [electronic_check, mailed_check, bank_transfer, credit_card]
  binary:
    - name: has_internet
      description: Customer has an internet service plan.
    - name: has_streaming
      description: Customer has a streaming add-on.

target: churn
